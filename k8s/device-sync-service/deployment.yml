apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-sync-service
  namespace: lissa-fit
  labels:
    app: device-sync-service
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: device-sync-service
  template:
    metadata:
      labels:
        app: device-sync-service
        version: v1
      annotations:
        prometheus.io/port: "8083"
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z wa-kafka 9092; do echo waiting for kafka; sleep 2; done;']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z wa-redis 6379; do echo waiting for redis; sleep 2; done;']
        - name: wait-for-auth-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z auth-service 80; do echo waiting for auth-service; sleep 2; done;']
        - name: wait-for-google-fit-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z google-fit-service 80; do echo waiting for google-fit-service; sleep 2; done;']
      containers:
        - name: device-sync-service
          image: mihailovpasha/device-sync-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SPRING_KAFKA_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS
              value: "false"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: REDIS_PORT
            - name: REDIS_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: REDIS_TIMEOUT
            - name: GOOGLE_FIT_INTEGRATION_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: GOOGLE_FIT_INTEGRATION_BASE_URL
            - name: GOOGLE_FIT_INTEGRATION_ENDPOINTS_ACTIVITY
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: GOOGLE_FIT_INTEGRATION_ENDPOINTS_ACTIVITY
            - name: GOOGLE_FIT_INTEGRATION_ENDPOINTS_HEART_RATE
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: GOOGLE_FIT_INTEGRATION_ENDPOINTS_HEART_RATE
            - name: GOOGLE_FIT_INTEGRATION_ENDPOINTS_SLEEP
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: GOOGLE_FIT_INTEGRATION_ENDPOINTS_SLEEP
            - name: GOOGLE_FIT_INTEGRATION_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: GOOGLE_FIT_INTEGRATION_TIMEOUT
            - name: AUTH_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: AUTH_SERVICE_BASE_URL
            - name: SCHEDULING_SYNC_DAILY_FULL_SYNC_CRON
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: DAILY_FULL_SYNC_CRON
            - name: CIPHER_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: CIPHER_ALGORITHM
            - name: SECRET_KEY_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: device-sync-service-config
                  key: SECRET_KEY_ALGORITHM
            - name: JWT_SECRET_ACCESS
              valueFrom:
                secretKeyRef:
                  name: device-sync-service-secrets
                  key: JWT_SECRET_ACCESS
            - name: ENCRYPT_SECRET
              valueFrom:
                secretKeyRef:
                  name: device-sync-service-secrets
                  key: ENCRYPT_SECRET
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "800m"